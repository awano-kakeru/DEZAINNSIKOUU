<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相談員用ダッシュボード</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden font-sans">

    <!-- 左：相談一覧 -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shrink-0">
        <div class="bg-indigo-700 text-white p-4">
            <h1 class="text-sm font-bold">相談員ダッシュボード</h1>
        </div>
        <div id="room-list" class="flex-1 overflow-y-auto"></div>
    </aside>

    <!-- 右：選んだ相談のチャット -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <div id="empty-state" class="flex-1 flex items-center justify-center text-gray-400 text-sm">
            左の一覧から相談を選んでください
        </div>

        <div id="chat-panel" class="hidden flex-1 flex flex-col overflow-hidden">
            <header class="bg-indigo-600 text-white p-3 shadow-md text-center shrink-0 text-sm">
                対応中のルーム：<span id="current-room-label" class="font-mono font-bold"></span>
            </header>

            <div id="chat-area" class="flex-1 p-4 overflow-y-auto max-w-2xl w-full mx-auto space-y-4"></div>

            <footer class="bg-white p-4 border-t border-gray-200 shadow-lg shrink-0">
                <div class="max-w-2xl w-full mx-auto flex gap-2">
                    <textarea id="message-input" rows="1" placeholder="返信を入力..." class="flex-1 border border-gray-300 rounded-lg p-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                    <button onclick="sendMessage()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 transition">
                        送信
                    </button>
                </div>
            </footer>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import {
            getDatabase, ref, push, set, onValue, onChildAdded, query, limitToLast, off
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACHBRS6noRtotR5dJG8L7XITjWK5PoElE",
            authDomain: "dezasiko.firebaseapp.com",
            databaseURL: "https://dezasiko-default-rtdb.firebaseio.com",
            projectId: "dezasiko",
            storageBucket: "dezasiko.firebasestorage.app",
            messagingSenderId: "997548422252",
            appId: "1:997548422252:web:aca0844465fc921b6b9449"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const myId = 'staff-' + Math.random().toString(36).slice(2, 10);
        let currentRoom = null;
        let currentMessagesRef = null;

        // 左側：相談一覧をリアルタイム表示（新しいものが上に来るよう並べ替え）
        onValue(ref(db, 'rooms_index'), (snapshot) => {
            const data = snapshot.val() || {};
            const rooms = Object.entries(data)
                .map(([code, meta]) => ({ code, ...meta }))
                .sort((a, b) => (b.lastActivity || 0) - (a.lastActivity || 0));

            renderRoomList(rooms);
        });

        function renderRoomList(rooms) {
            const listEl = document.getElementById('room-list');
            listEl.innerHTML = '';

            if (rooms.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'p-4 text-xs text-gray-400';
                empty.textContent = 'まだ相談はありません';
                listEl.appendChild(empty);
                return;
            }

            rooms.forEach(room => {
                const item = document.createElement('button');
                item.className = 'w-full text-left p-3 border-b border-gray-100 hover:bg-indigo-50 transition text-xs ' +
                    (room.code === currentRoom ? 'bg-indigo-100' : '');

                const time = room.lastActivity ? new Date(room.lastActivity).toLocaleString('ja-JP') : '';
                item.innerHTML = `
                    <div class="font-mono font-bold text-gray-700">${room.code}</div>
                    <div class="text-gray-400 mt-0.5">${time}</div>
                `;
                item.onclick = () => openRoom(room.code);
                listEl.appendChild(item);
            });
        }

        function openRoom(code) {
            // 前の部屋の購読を解除してから、新しい部屋を開く
            if (currentMessagesRef) {
                off(currentMessagesRef);
            }

            currentRoom = code;
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('chat-panel').classList.remove('hidden');
            document.getElementById('current-room-label').textContent = code;
            document.getElementById('chat-area').innerHTML = '';

            currentMessagesRef = query(ref(db, 'chatrooms/' + code + '/messages'), limitToLast(200));
            onChildAdded(currentMessagesRef, (snapshot) => {
                const msg = snapshot.val();
                addMessageToDom(msg.text, msg.senderId === myId, msg.senderName);
            });
        }

        function addMessageToDom(text, isMine, senderName) {
            const chatArea = document.getElementById('chat-area');
            const wrapper = document.createElement('div');
            wrapper.classList.add('flex', 'flex-col', isMine ? 'items-end' : 'items-start');

            const label = document.createElement('div');
            label.className = 'text-[10px] text-gray-400 mb-0.5 px-1';
            label.textContent = isMine ? 'あなた（相談員）' : senderName;
            wrapper.appendChild(label);

            const bubble = document.createElement('div');
            bubble.innerText = text;
            bubble.classList.add('p-3', 'rounded-lg', 'shadow-sm', 'text-sm', 'max-w-[80%]', 'break-words');
            bubble.classList.add(...(isMine
                ? ['bg-indigo-500', 'text-white']
                : ['bg-white', 'text-gray-700', 'border', 'border-gray-200']));
            wrapper.appendChild(bubble);

            chatArea.appendChild(wrapper);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        window.sendMessage = function () {
            if (!currentRoom) return;
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            push(ref(db, 'chatrooms/' + currentRoom + '/messages'), {
                text: text,
                senderId: myId,
                senderName: '相談員',
                ts: Date.now()
            });

            set(ref(db, 'rooms_index/' + currentRoom), {
                lastActivity: Date.now(),
                lastSender: 'staff'
            });

            input.value = '';
        };

        document.getElementById('message-input').addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                window.sendMessage();
            }
        });
    </script>
</body>
</html>
