<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿名お悩み相談室</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans overflow-hidden">

    <header class="bg-indigo-600 text-white p-4 shadow-md text-center shrink-0">
        <h1 class="text-lg font-bold">ココロの匿名相談室</h1>
        <p class="text-xs text-indigo-200 mt-1">このページのやり取りは、あなたと相談員だけに見えます</p>
    </header>

    <main id="chat-area" class="flex-1 p-4 overflow-y-auto max-w-2xl w-full mx-auto space-y-4">
        <div class="flex flex-col items-start">
            <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 max-w-[80%] text-gray-700 text-sm">
                こんにちは。ここはあなただけの秘密の相談室です。誰にも言えないお悩みや、聴いてほしいことを何でも書き込んでくださいね。相談員が確認でき次第、お返事します（すぐに繋がらない場合もあります）。
            </div>
        </div>
    </main>

    <div id="status-bar" class="text-center text-xs text-gray-400 py-1 shrink-0">準備中...</div>

    <footer class="bg-white p-4 border-t border-gray-200 shadow-lg shrink-0">
        <div class="max-w-2xl w-full mx-auto flex gap-2">
            <textarea id="message-input" rows="1" placeholder="ここにお悩みを入力..." class="flex-1 border border-gray-300 rounded-lg p-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
            <button onclick="sendMessage()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 transition">
                送信
            </button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import {
            getDatabase, ref, push, set, onChildAdded, query, limitToLast
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACHBRS6noRtotR5dJG8L7XITjWK5PoElE",
            authDomain: "dezasiko.firebaseapp.com",
            databaseURL: "https://dezasiko-default-rtdb.firebaseio.com",
            projectId: "dezasiko",
            storageBucket: "dezasiko.firebasestorage.app",
            messagingSenderId: "997548422252",
            appId: "1:997548422252:web:aca0844465fc921b6b9449"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const myId = 'visitor-' + Math.random().toString(36).slice(2, 10);

        // このタブを開いた瞬間、専用の部屋番号を自動発行する（相談者は意識しなくてよい）
        const roomCode = Math.random().toString(36).slice(2, 6) + '-' + Math.random().toString(36).slice(2, 6);

        function registerRoomActivity() {
            // 運営者の一覧画面に「新着の相談」として表示させるための索引情報
            set(ref(db, 'rooms_index/' + roomCode), {
                lastActivity: Date.now(),
                lastSender: 'visitor'
            });
        }

        function listenForMessages() {
            const statusBar = document.getElementById('status-bar');
            const messagesRef = query(ref(db, 'chatrooms/' + roomCode + '/messages'), limitToLast(200));

            onChildAdded(messagesRef, (snapshot) => {
                const msg = snapshot.val();
                addMessageToDom(msg.text, msg.senderId === myId);
            }, (error) => {
                statusBar.textContent = '接続エラーが発生しました。時間をおいて再度お試しください。';
                console.error(error);
            });

            statusBar.textContent = '接続中';
        }

        function addMessageToDom(text, isMine) {
            const chatArea = document.getElementById('chat-area');
            const wrapper = document.createElement('div');
            wrapper.classList.add('flex', 'flex-col', isMine ? 'items-end' : 'items-start');

            const label = document.createElement('div');
            label.className = 'text-[10px] text-gray-400 mb-0.5 px-1';
            label.textContent = isMine ? 'あなた' : '相談員';
            wrapper.appendChild(label);

            const bubble = document.createElement('div');
            bubble.innerText = text;
            bubble.classList.add('p-3', 'rounded-lg', 'shadow-sm', 'text-sm', 'max-w-[80%]', 'break-words');
            bubble.classList.add(...(isMine
                ? ['bg-indigo-500', 'text-white']
                : ['bg-white', 'text-gray-700', 'border', 'border-gray-200']));
            wrapper.appendChild(bubble);

            chatArea.appendChild(wrapper);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        window.sendMessage = function () {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            const messagesRef = ref(db, 'chatrooms/' + roomCode + '/messages');
            push(messagesRef, {
                text: text,
                senderId: myId,
                senderName: '相談者',
                ts: Date.now()
            });
            registerRoomActivity();

            input.value = '';
        };

        document.getElementById('message-input').addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                window.sendMessage();
            }
        });

        // 初期化：部屋を登録して、メッセージの受信を開始する
        registerRoomActivity();
        listenForMessages();
    </script>
</body>
</html>
